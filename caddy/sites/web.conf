# BEVEL tenant app — primary local surface (port 43200)
bevel.lvh.me {
	import devsite 43200 bevel-web
}

# Old demo host → canonical product host (do not reverse-proxy here;
# a clean 308 avoids reusing a poisoned browser TLS/QUIC cache on this name).
demo.bevel.lvh.me {
	redir https://bevel.lvh.me{uri} permanent
}

# Claimed workspaces use soft multi-tenant on bevel.lvh.me first.
# Per-slug hosts can be added explicitly after provision (avoid broad *.bevel.lvh.me —
# it fights admin/api/docs/realtime TLS and can poison local cert selection).

bevel.acme.lvh.me {
	import devsite 43200 bevel-web
}

acme.bevel.lvh.me {
	import devsite 43200 bevel-web
}

# 2x4m org workspace — BEVEL is the agents product (no "agents" in the host)
bevel.2x4m.lvh.me {
	import devsite 43200 bevel-web
}

# Legacy host (pre-rename) → canonical
bevel.agents.2x4m.lvh.me {
	redir https://bevel.2x4m.lvh.me{uri} permanent
}

bevel.2ndbrain.lvh.me {
	import devsite 43200 bevel-web
}

bevel.preso.lvh.me {
	import devsite 43200 bevel-web
}
