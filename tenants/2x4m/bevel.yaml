tenant: 2x4m
name: 2x4m
domain: bevel.2x4m.cc
hosts:
  # Primary production host + local preview aliases
  - bevel.2x4m.cc
  - bevel.2x4m.lvh.me
  - 2x4m.lvh.me

# Plan + release access drive feature set (docs/FEATURE_SETS.md)
# plan: free | trial | pro | team | enterprise
# feature_access: stable | beta | upcoming
plan: pro
feature_access: beta

brand:
  theme: ./theme.json
  product_name: 2x4m
  logo: ./logo.svg
  # Four unique day-part marks (rail, left of product name)
  logos:
    morning: ./logos/logo-morning.svg
    midday: ./logos/logo-midday.svg
    afternoon: ./logos/logo-afternoon.svg
    night: ./logos/logo-night.svg

features:
  async_streams: true
  live_sessions: true
  analytics: true
  channels: true
  direct_messages: true
  agent_dispatch: true
  work_mode: true
  custom_branding: true
  sms: true

auth:
  mode: google
  # Align with 2x4m platform authorized-domains (packages/auth)
  allowed_domains:
    - 2x4m.cc
    - 2x4m.systems
    - derozic.com
    - comma.cm
  allowed_emails:
    - twobyform@gmail.com
    - sderozic@gmail.com
    - scott@comma.cm
  # Platform login: Workspace users on these domains land in 2x4m
  # with that org's channels + history (home workspace).
  default_for_domains:
    - 2x4m.cc
    - 2x4m.systems
    - derozic.com
    - comma.cm
  require_github_for_work: true

realtime:
  namespace: 2x4m
  presence: true
  url: https://realtime.bevel.lvh.me

transports:
  asyncStream:
    kind: async-stream
    protocol: sse
  liveBidirectional:
    kind: live-bidirectional
    protocol: websocket

deployment:
  preview_url: https://bevel.2x4m.lvh.me
  production_url: https://bevel.2x4m.cc
  target: custom

work_repos:
  - derozic/2x4m
