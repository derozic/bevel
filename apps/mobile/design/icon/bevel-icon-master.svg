-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="BEVEL">
  <!-- Layer: background -->
  <rect id="layer-background" width="1024" height="1024" rx="224" fill="#0A0E12"/>
  <!-- Layer: soft glow -->
  <circle id="layer-glow" cx="512" cy="480" r="280" fill="#22C55E" opacity="0.12"/>
  <!-- Layer: bevel plane left -->
  <path id="layer-plane-left" d="M300 260 L480 260 L480 764 L300 700 Z" fill="#1A2330"/>
