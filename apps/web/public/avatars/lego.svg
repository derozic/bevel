<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="none" role="img" aria-label="Lego">
  <defs>
    <linearGradient id="le-bg" x1="8" y1="8" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14532d"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="le-brick" x1="28" y1="30" x2="70" y2="78" gradientUnits="userSpaceOnUse">
      <stop stop-color="#bbf7d0"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
  </defs>
  <rect width="96" height="96" rx="28" fill="url(#le-bg)"/>
  <circle cx="48" cy="46" r="34" fill="#86efac" opacity=".18"/>
  <!-- brick body -->
  <rect x="24" y="38" width="48" height="36" rx="8" fill="url(#le-brick)" stroke="#fff" stroke-width="2"/>
  <!-- studs -->
  <rect x="30" y="28" width="14" height="14" rx="4" fill="#86efac" stroke="#fff" stroke-width="2"/>
  <rect x="52" y="28" width="14" height="14" rx="4" fill="#4ade80" stroke="#fff" stroke-width="2"/>
  <!-- face on brick -->
  <circle cx="40" cy="52" r="2.6" fill="#14532d"/>
  <circle cx="56" cy="52" r="2.6" fill="#14532d"/>
  <circle cx="40.7" cy="51.3" r="0.8" fill="#ecfdf5"/>
  <circle cx="56.7" cy="51.3" r="0.8" fill="#ecfdf5"/>
  <path d="M40 60c2.5 3 13.5 3 16 0" stroke="#166534" stroke-width="2" stroke-linecap="round"/>
  <!-- tools spark -->
  <path d="M70 22l3 6 6 1-5 4 2 6-6-3-6 3 2-6-5-4 6-1z" fill="#fbbf24"/>
  <path d="M22 74h10" stroke="#bbf7d0" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M27 69v10" stroke="#bbf7d0" stroke-width="2.5" stroke-linecap="round"/>
</svg>
